<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>NekoCam</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="app">
        <div id="viewer">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            <div id="fps">-- FPS</div>
        </div>

        <div id="controls">
            <div id="tabs"></div>
            <div id="effectsGrid"></div>
            <div id="sliderContainer">
                <label for="intensity">Intensity</label>
                <input type="range" id="intensity" min="0" max="1" step="0.01" value="0.80" />
                <span id="intensityValue">0.80</span>
            </div>
            <div id="actions">
                <button id="recordBtn">⏺ Record</button>
                <button id="snapshotBtn">📸 Snapshot</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vconsole@3.15.1/dist/vconsole.min.js"></script>
    <script>
        var vConsole = new VConsole();
        console.log('[NekoCam] vConsole ready');
    </script>

    <script type="module" src="src/core/app.js"></script>
</body>
</html>
