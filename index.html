<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>NekoCam</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="app">
        <div id="viewer">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            <div id="fps">-- FPS</div>
        </div>

        <div id="controls">
            <div id="tabs"></div>
            <div id="effectsGrid"></div>
            <div id="sliderContainer">
                <label for="intensity">Intensity</label>
                <input type="range" id="intensity" min="0" max="1" step="0.01" value="0.80" />
                <span id="intensityValue">0.80</span>
            </div>
            <div id="actions">
                <button id="recordBtn">⏺ Record</button>
                <button id="snapshotBtn">📸 Snapshot</button>
            </div>
        </div>
    </div>

    <!-- vConsole -->
    <script src="https://cdn.jsdelivr.net/npm/vconsole@3.15.1/dist/vconsole.min.js"></script>
    <script>
        var vConsole = new VConsole();
        console.log('[HTML] vConsole ready');
        console.log('[HTML] Current URL:', window.location.href);
        console.log('[HTML] Base path:', document.baseURI);
    </script>

    <!-- ====== MODULE DEBUG ====== -->
    <script type="module">
        console.log('[HTML] Module script started');

        // Try to load app.js dynamically and log every step
        try {
            console.log('[HTML] Attempting to import ./src/core/app.js...');
            const module = await import('./src/core/app.js');
            console.log('[HTML] ✅ app.js loaded successfully');
            console.log('[HTML] Exports:', Object.keys(module));

            if (typeof module.initApp === 'function') {
                console.log('[HTML] Calling initApp()...');
                await module.initApp();
                console.log('[HTML] ✅ initApp() completed');
            } else {
                console.error('[HTML] ❌ initApp is not a function — exports:', module);
            }
        } catch (err) {
            console.error('[HTML] ❌ Failed to load or execute app.js:', err);
            console.error('[HTML] Error name:', err.name);
            console.error('[HTML] Error message:', err.message);
            console.error('[HTML] Stack trace:', err.stack);
        }
    </script>

    <!-- ====== FALLBACK: Try loading as regular script ====== -->
    <script>
        console.log('[HTML] Fallback: Attempting to load app.js as classic script...');
        const script = document.createElement('script');
        script.src = 'src/core/app.js';
        script.onload = () => console.log('[HTML] ✅ Fallback: app.js loaded as classic script');
        script.onerror = () => console.error('[HTML] ❌ Fallback: app.js failed to load');
        document.head.appendChild(script);
    </script>
</body>
</html>
