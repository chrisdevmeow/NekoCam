<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>NekoCam</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        /* Flip button style */
        #flipBtn {
            background: #3a3a4a;
            font-size: 1.2rem;
            padding: 8px 16px;
            border-radius: 30px;
            border: none;
            color: #fff;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="viewer">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            <div id="fps">-- FPS</div>
        </div>

        <div id="controls">
            <div id="tabs"></div>
            <div id="effectsGrid"></div>
            <div id="sliderContainer">
                <label for="intensity">Intensity</label>
                <input type="range" id="intensity" min="0" max="1" step="0.01" value="0.80" />
                <span id="intensityValue">0.80</span>
            </div>
            <div id="actions">
                <button id="recordBtn">⏺ Record</button>
                <button id="snapshotBtn">📸 Snapshot</button>
                <button id="flipBtn">🔄</button>
            </div>
        </div>
    </div>

    <!-- vConsole -->
    <script src="https://cdn.jsdelivr.net/npm/vconsole@3.15.1/dist/vconsole.min.js"></script>
    <script>
        var vConsole = new VConsole();
        console.log('[NekoCam] vConsole ready');
    </script>

    <!-- Main App -->
    <script type="module" src="src/core/app.js"></script>

    <!-- Flip Camera Handler -->
    <script>
        document.getElementById('flipBtn').addEventListener('click', async () => {
            const video = document.getElementById('video');
            const stream = video.srcObject;
            if (!stream) return;
            const track = stream.getVideoTracks()[0];
            if (!track) return;
            const current = track.getSettings().facingMode || 'user';
            const next = current === 'user' ? 'environment' : 'user';
            try {
                const newStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: next }
                });
                video.srcObject = newStream;
                await video.play();
                console.log('[Flip] Switched to:', next);
            } catch (e) {
                console.error('[Flip] Failed:', e);
            }
        });
    </script>
</body>
</html>
